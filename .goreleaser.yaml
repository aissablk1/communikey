# GoReleaser — binaires multi-plateformes + tap Homebrew, en 1 push de tag.
#   git tag v0.2.0 && git push --tags   →   CI publie la release + met à jour le tap.
version: 2
project_name: communikey

before:
  hooks:
    - go mod tidy

builds:
  - id: communikey
    main: .
    binary: communikey
    env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: communikey
    # Nom STABLE (sans version) pour que site/install.sh résolve
    # github.com/aissablk1/communikey/releases/latest/download/communikey_<os>_<arch>.tar.gz
    name_template: "communikey_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

# Provenance LOCALE (part de #38 faisable sans GitHub Actions) : SBOM CycloneDX par archive.
# Nécessite `syft` au moment de la release (brew install syft). Le SLSA-in-Actions et la
# signature cosign viennent en plus quand la CI est débloquée / une clé cosign est posée.
sboms:
  - id: communikey
    artifacts: archive
    documents: ["${artifact}.sbom.cdx.json"]
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# NB: la section `brews` (formule Homebrew) est dépréciée par goreleaser au profit de
# `homebrew_casks` ; mais un cask est macOS-only. On garde la FORMULE pour servir AUSSI
# Homebrew/Linux (installation binaire cross-plateforme). À réévaluer si goreleaser retire brews.
brews:
  - name: communikey
    repository:
      owner: aissablk1
      name: homebrew-tap
    homepage: "https://communikey.dev"
    description: "Bus de messagerie inter-agents pour CLI (state-aware, chiffré, zéro dépendance)"
    license: "Apache-2.0"
    install: |
      bin.install "communikey"
    test: |
      system "#{bin}/communikey", "help"

release:
  github:
    owner: aissablk1
    name: communikey
  draft: false
