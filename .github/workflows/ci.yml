name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (bumpé 2026-07-09 — Node 24)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 (bumpé 2026-07-09 — Node 24)
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go build .

  race:
    name: race (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (bumpé 2026-07-09 — Node 24)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 (bumpé 2026-07-09 — Node 24)
        with:
          go-version: '1.25'
          cache: true
      - run: go test -race ./...
