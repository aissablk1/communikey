name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (épinglé 2026-07-05)
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 (épinglé 2026-07-05)
        with:
          go-version: '1.24'
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go build .

  race:
    name: race (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (épinglé 2026-07-05)
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 (épinglé 2026-07-05)
        with:
          go-version: '1.24'
          cache: true
      - run: go test -race ./...
