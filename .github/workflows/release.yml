name: Release

# Publie la release + PROVENANCE quand un tag vX.Y.Z est poussé (complète #38).
# Ne tourne QUE sur tag → zéro bruit sur les push normaux (la CI de test = ci.yml).
#
# Chaîne : goreleaser (binaires multi-OS + SBOM CycloneDX via syft) → attestation
# SLSA de provenance (native GitHub) → signature keyless cosign des checksums (OIDC).
#
# Actions épinglées par SHA complet (résolu depuis les tags majeurs le 2026-07-05,
# §38 supply-chain) — re-résoudre le SHA si une action doit être mise à jour, ne
# jamais revenir à un tag mutable (@v4, @v5…).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # créer la release + uploader les assets/signatures
  id-token: write # OIDC → cosign keyless + attestation de provenance
  attestations: write # actions/attest-build-provenance (SLSA)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0 — syft, requis par le bloc `sboms` de goreleaser
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3 — cosign, pour la signature keyless
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attestation SLSA de provenance sur les artefacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: "dist/communikey_*.tar.gz,dist/communikey_*.zip,dist/checksums.txt"
      - name: Signature keyless cosign des checksums (OIDC)
        run: |
          cosign sign-blob --yes dist/checksums.txt \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem
          gh release upload "${GITHUB_REF_NAME}" \
            dist/checksums.txt.sig dist/checksums.txt.pem --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
